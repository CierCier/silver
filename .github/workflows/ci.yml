name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-24.04
    env:
      # llvm-sys 221.x (inkwell feature "llvm22-1") looks for LLVM 22.1 here.
      LLVM_SYS_221_PREFIX: /usr/lib/llvm-22
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 22
        run: |
          wget -q https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22
          # llvm.sh installs the clang/lld toolchain; llvm-sys additionally
          # needs the LLVM development files (llvm-config, headers, libs).
          sudo apt-get install -y llvm-22-dev libpolly-22-dev libzstd-dev zlib1g-dev
          /usr/lib/llvm-22/bin/llvm-config --version

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run compiler unit tests
        run: cargo test -p agc

      - name: Run integration tests
        run: bash tests/run_tests.sh
